name: Sync GitHub Actions secrets to Codespaces secrets

on:
  workflow_dispatch:

jobs:
  sync-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Sync GitHub Actions secrets to Codespaces
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.CODESPACES_ACCESS_TOKEN }}
          script: |
            const crypto = require('crypto');
            const secretNames = [
              'AUGUST_API_KEY',
              'AUGUST_IDENTIFIER',
              'AUGUST_INSTALL_ID',
              'AUGUST_LOCK',
              'AUGUST_PASSWORD',
              'GOOGLE_CALENDAR_ID',
              'GOOGLE_CALENDAR_ID_16F',
              'GOOGLE_CREDENTIALS',
              'GOOGLE_SHEET_ID',
              'GUESTY_ACCOUNT',
              'GUESTY_API_KEY',
              'GUESTY_LISTING',
              'GUESTY_LISTING_16F',
              'GUESTY_PASSWORD',
              'GUESTY_USERNAME',
              'LOCK_16F_FRONT',
              'LOCK_16F_SIDE',
              'LOCK_3306_CLOSET',
              'LOCK_3306_FRONT',
              'SMARTTHINGS_POOL_ID_16F',
              'SMARTTHINGS_TOKEN',
              'STREAMLINE_EMAIL',
              'STREAMLINE_PASSWORD',
              'STREAMLINE_UNIT_ID',
            ];

            const secrets = secretNames
              .map(name => ({ name, value: process.env[`SECRET_${name}`] || '' }))
              .filter(secret => secret.value !== '');

            if (!secrets.length) {
              core.info('No configured secrets found. Nothing to sync.');
              return;
            }

            const publicKeyResponse = await github.request('GET /user/codespaces/secrets/public-key');
            const publicKey = publicKeyResponse.data.key;
            const keyId = publicKeyResponse.data.key_id;
            const publicKeyBuffer = Buffer.from(publicKey, 'base64');
            const publicKeyObject = crypto.createPublicKey({ key: publicKeyBuffer, format: 'der', type: 'spki' });

            for (const secret of secrets) {
              const encryptedValue = crypto.publicEncrypt(
                {
                  key: publicKeyObject,
                  padding: crypto.constants.RSA_PKCS1_OAEP_PADDING,
                  oaepHash: 'sha256',
                },
                Buffer.from(secret.value, 'utf8')
              ).toString('base64');

              await github.request('PUT /user/codespaces/secrets/{secret_name}', {
                secret_name: secret.name,
                encrypted_value: encryptedValue,
                key_id: keyId,
              });

              core.info(`Synced secret ${secret.name} to Codespaces user secrets.`);
            }

            core.info(`Synced ${secrets.length} secrets to Codespaces user secrets.`);
        env:
          SECRET_AUGUST_API_KEY: ${{ secrets.AUGUST_API_KEY }}
          SECRET_AUGUST_IDENTIFIER: ${{ secrets.AUGUST_IDENTIFIER }}
          SECRET_AUGUST_INSTALL_ID: ${{ secrets.AUGUST_INSTALL_ID }}
          SECRET_AUGUST_LOCK: ${{ secrets.AUGUST_LOCK }}
          SECRET_AUGUST_PASSWORD: ${{ secrets.AUGUST_PASSWORD }}
          SECRET_GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          SECRET_GOOGLE_CALENDAR_ID_16F: ${{ secrets.GOOGLE_CALENDAR_ID_16F }}
          SECRET_GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SECRET_GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          SECRET_GUESTY_ACCOUNT: ${{ secrets.GUESTY_ACCOUNT }}
          SECRET_GUESTY_API_KEY: ${{ secrets.GUESTY_API_KEY }}
          SECRET_GUESTY_LISTING: ${{ secrets.GUESTY_LISTING }}
          SECRET_GUESTY_LISTING_16F: ${{ secrets.GUESTY_LISTING_16F }}
          SECRET_GUESTY_PASSWORD: ${{ secrets.GUESTY_PASSWORD }}
          SECRET_GUESTY_USERNAME: ${{ secrets.GUESTY_USERNAME }}
          SECRET_LOCK_16F_FRONT: ${{ secrets.LOCK_16F_FRONT }}
          SECRET_LOCK_16F_SIDE: ${{ secrets.LOCK_16F_SIDE }}
          SECRET_LOCK_3306_CLOSET: ${{ secrets.LOCK_3306_CLOSET }}
          SECRET_LOCK_3306_FRONT: ${{ secrets.LOCK_3306_FRONT }}
          SECRET_SMARTTHINGS_POOL_ID_16F: ${{ secrets.SMARTTHINGS_POOL_ID_16F }}
          SECRET_SMARTTHINGS_TOKEN: ${{ secrets.SMARTTHINGS_TOKEN }}
          SECRET_STREAMLINE_EMAIL: ${{ secrets.STREAMLINE_EMAIL }}
          SECRET_STREAMLINE_PASSWORD: ${{ secrets.STREAMLINE_PASSWORD }}
          SECRET_STREAMLINE_UNIT_ID: ${{ secrets.STREAMLINE_UNIT_ID }}
