name: Sync GitHub Actions secrets to Codespaces secrets

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Codespaces secret target scope'
        required: true
        default: 'user'
        type: choice
        options:
          - user
          - org
      org:
        description: 'Organization name when using org-level Codespaces secrets'
        required: false
        default: ''

jobs:
  list-repo-secrets:
    name: List repository secrets
    runs-on: ubuntu-latest
    permissions:
      actions: read
    outputs:
      secret-names: ${{ steps.list.outputs.secret-names }}
    steps:
      - name: List repository secrets
        id: list
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const secrets = await github.paginate(github.rest.actions.listRepoSecrets, { owner, repo });
            const names = secrets.map(secret => secret.name);
            core.setOutput('secret-names', JSON.stringify(names));

  sync-secrets:
    name: Sync secrets to Codespaces
    needs: list-repo-secrets
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        secret_name: ${{ fromJson(needs.list-repo-secrets.outputs.secret-names) }}
    steps:
      - name: Sync secret to Codespaces
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.CODESPACES_ACCESS_TOKEN }}
          script: |
            const crypto = require('crypto');
            const secretName = process.env.SECRET_NAME;
            const secretValue = process.env.SECRET_VALUE;
            const target = process.env.TARGET_SCOPE;
            const org = process.env.CODESPACES_ORG;

            if (!secretValue) {
              throw new Error(`Secret value for ${secretName} is not available in workflow context.`);
            }

            let publicKeyResponse;
            if (target === 'org') {
              if (!org) {
                throw new Error('Organization name is required for org-level Codespaces secrets.');
              }
              publicKeyResponse = await github.request('GET /orgs/{org}/codespaces/secrets/public-key', {
                org,
              });
            } else {
              publicKeyResponse = await github.request('GET /user/codespaces/secrets/public-key');
            }

            const publicKey = publicKeyResponse.data.key;
            const keyId = publicKeyResponse.data.key_id;
            const publicKeyBuffer = Buffer.from(publicKey, 'base64');
            const publicKeyObject = crypto.createPublicKey({ key: publicKeyBuffer, format: 'der', type: 'spki' });
            const encryptedValue = crypto.publicEncrypt(
              {
                key: publicKeyObject,
                padding: crypto.constants.RSA_PKCS1_OAEP_PADDING,
                oaepHash: 'sha256',
              },
              Buffer.from(secretValue, 'utf8')
            ).toString('base64');

            if (target === 'org') {
              await github.request('PUT /orgs/{org}/codespaces/secrets/{secret_name}', {
                org,
                secret_name: secretName,
                encrypted_value: encryptedValue,
                key_id: keyId,
              });
            } else {
              await github.request('PUT /user/codespaces/secrets/{secret_name}', {
                secret_name: secretName,
                encrypted_value: encryptedValue,
                key_id: keyId,
              });
            }

            core.info(`Synced secret ${secretName} to Codespaces ${target} secrets.`);
        env:
          TARGET_SCOPE: ${{ github.event.inputs.target }}
          CODESPACES_ORG: ${{ github.event.inputs.org }}
          SECRET_NAME: ${{ matrix.secret_name }}
          SECRET_VALUE: ${{ secrets[matrix.secret_name] }}
